<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d84315;
            --secondary: #bf360c;
            --background: #000000;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: #808080;
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: #000000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated background blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation: float 10s ease-in-out infinite;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(20px) scale(1.1);
            }

            100% {
                transform: translateY(0) scale(1);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 800px;
            margin: 2rem auto;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            text-align: center;
        }

        h1 {
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #d84315 0%, #bf360c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #b0b0b0;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(216, 67, 21, 0.3);
            background: rgba(0, 0, 0, 0.3);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: black;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;

        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .image-container {
            margin-top: 2rem;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed var(--glass-border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .image-container.has-image {
            border-style: solid;
            background: transparent;
        }

        #result-image {
            max-width: 100%;
            border-radius: 16px;
            display: none;
            animation: fadeIn 0.5s ease-in-out;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--secondary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .placeholder-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
        }

        .error-message {
            color: #ff4757;
            margin-top: 1rem;
            display: none;
            font-weight: 400;
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }

            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <h1>Imagine Anything</h1>
        <p class="subtitle">Turn your text into stunning visuals in seconds</p>

        <form id="generate-form">
            <div class="input-group">
                <input type="text" id="prompt" placeholder="Describe the image you want to see..." required
                    autocomplete="off">
                <button type="submit" id="submit-btn">Generate</button>
            </div>
        </form>

        <div id="error" class="error-message"></div>

        <div class="image-container" id="image-box">
            <div class="placeholder-text" id="placeholder">Your image will appear here</div>
            <div class="loader" id="loader"></div>
            <img id="result-image" alt="Generated Image">
        </div>
    </div>

    <script>
        const form = document.getElementById('generate-form');
        const promptInput = document.getElementById('prompt');
        const submitBtn = document.getElementById('submit-btn');
        const imageBox = document.getElementById('image-box');
        const resultImage = document.getElementById('result-image');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder');
        const errorMsg = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // UI loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Generating...';
            resultImage.style.display = 'none';
            placeholder.style.display = 'none';
            errorMsg.style.display = 'none';
            loader.style.display = 'block';
            imageBox.classList.remove('has-image');

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Failed to generate image');
                }

                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);

                resultImage.src = imageUrl;
                resultImage.onload = () => {
                    loader.style.display = 'none';
                    resultImage.style.display = 'block';
                    imageBox.classList.add('has-image');
                };

            } catch (error) {
                console.error('Error:', error);
                loader.style.display = 'none';
                placeholder.style.display = 'block';
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Generate';
            }
        });
    </script>
</body>

</html>
